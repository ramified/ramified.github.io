<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ramified Minigames</title>
  <link rel="stylesheet" href="css/site.css">
<style>
    .mosaic-layout {
      max-width: 1220px;
      grid-template-columns: minmax(0, 1fr) 340px;
    }

    #mosaic-canvas {
      cursor: pointer;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .mosaic-toolbar-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding-left: 12px;
      border-left: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }

    .mosaic-toolbar-group label,
    .mosaic-toolbar-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .mosaic-toolbar-select {
      min-width: 92px;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      font-size: 0.82rem;
    }

    .mosaic-toolbar-select:focus {
      outline: 2px solid var(--accent);
      border-color: var(--accent);
    }

    .mosaic-toolbar-toggle {
      padding-left: 12px;
      border-left: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .mosaic-toolbar-toggle input {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .mosaic-underbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 0 16px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .mosaic-underbar-left {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mosaic-status-good { color: var(--accent); }
    .mosaic-status-bad { color: var(--accent2); }

    .mosaic-inline-row {
      display: grid;
      grid-template-columns: 116px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }

    .mosaic-inline-row .input-label {
      margin-bottom: 0 !important;
      white-space: nowrap;
    }

    .input-mode-panel[hidden],
    .mosaic-inline-row[hidden],
    .mosaic-view-row[hidden] {
      display: none !important;
    }

    .mosaic-inline-row select {
      width: 100%;
      min-width: 0;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      font-size: 0.9rem;
    }

    .mosaic-inline-row select:focus {
      outline: 2px solid var(--accent);
      border-color: var(--accent);
    }

    .billiard-controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .billiard-controls .btn {
      padding: 4px 10px;
      font-size: 0.76rem;
    }

    .mosaic-chip {
      display: inline-flex;
      align-items: center;
      min-height: 21px;
      padding: 1px 6px;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      background: rgba(255,255,255,0.55);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      white-space: nowrap;
    }

    .mosaic-underbar-clear {
      padding: 4px 12px;
      font-size: 0.72rem;
    }

    @media (max-width: 980px) {
      .mosaic-layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 520px) {
      .mosaic-number-row,
      .mosaic-mode-row,
      .mosaic-view-row,
      .mosaic-inline-row {
        grid-template-columns: 1fr;
      }

      .mosaic-toolbar-group,
      .mosaic-toolbar-toggle {
        padding-left: 0;
        border-left: none;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Ramified Minigames</h1>
  <span><a href="mosaic_calculator.html">Mosaic Calculator</a> &middot; <a href="index.html">Pure Math Toolkit</a> &middot; glued-boundary games</span>
</header>

<main class="layout mosaic-layout">
  <section class="canvas-panel" aria-label="Ramified minigame canvas panel">
    <header class="panel-title">
      <span class="panel-title-text">Ramified 2048</span>
      <div class="canvas-toolbar" aria-label="Ramified minigame controls">
        <span class="shape-indicator" title="Round status"><span id="status-badge" class="mosaic-chip">ready</span></span>
        <span class="shape-indicator" title="Surface type"><span id="surface-badge" class="mosaic-chip">M_1</span></span>
        <span class="mosaic-toolbar-group" aria-label="Game selector">
          <label title="Game">
            <span>game</span>
            <select id="game-select" class="mosaic-toolbar-select">
              <option value="2048" selected>2048</option>
            </select>
          </label>
        </span>
        <span class="mosaic-toolbar-group" aria-label="Surface preset selector">
          <label title="Surface preset">
            <span>surface</span>
            <select id="surface-select" class="mosaic-toolbar-select"></select>
          </label>
        </span>
      </div>
    </header>
    <div id="canvas-wrap">
      <canvas id="mosaic-canvas" tabindex="0" aria-label="Glued-boundary 2048 board"></canvas>
    </div>
    <div class="mosaic-underbar">
      <span class="mosaic-underbar-left">
        <button class="btn btn-ghost mosaic-underbar-clear" id="new-game" type="button">new game</button>
        <span id="status-line">ready</span>
      </span>
      <span id="surface-meta">torus</span>
    </div>
  </section>

  <aside class="side" aria-label="Ramified minigame controls">
    <section class="card">
      <div class="card-head"><span class="drag-handle" title="drag card">&#8942;&#8942;</span><span class="card-head-label">Move</span><em class="toggle-icon">&#9662;</em></div>
      <div class="card-body">
        <div class="mosaic-inline-row">
          <span class="input-label">Slide</span>
          <span class="billiard-controls" aria-label="Slide direction">
            <button class="btn" type="button" data-move="up" aria-label="slide north">&uarr;</button>
            <button class="btn" type="button" data-move="left" aria-label="slide west">&larr;</button>
            <button class="btn" type="button" data-move="right" aria-label="slide east">&rarr;</button>
            <button class="btn" type="button" data-move="down" aria-label="slide south">&darr;</button>
          </span>
        </div>
      </div>
    </section>

    <section class="card" id="statistics-card">
      <div class="card-head"><span class="drag-handle" title="drag card">&#8942;&#8942;</span><span class="card-head-label" id="statistics-card-label">Statistics</span><em class="toggle-icon">&#9662;</em></div>
      <div class="card-body">
        <div class="stat-row"><span class="stat-label">Score</span><span class="stat-value" id="score-value">0</span></div>
        <div class="stat-row"><span class="stat-label">Highest tile</span><span class="stat-value" id="highest-value">0</span></div>
        <div class="stat-row"><span class="stat-label">Open tiles</span><span class="stat-value" id="open-value">0</span></div>
        <div class="stat-row"><span class="stat-label">Removed tiles</span><span class="stat-value" id="removed-value">0</span></div>
      </div>
    </section>
  </aside>
</main>

<footer>
  Browser-side minigames on glued mosaic background spaces.
</footer>

<script src="js/ramified_minigames.js?v=mosaic-shell-4"></script>
</body>
</html>
